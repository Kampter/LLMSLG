version: 2

# Dependabot for LLMSLG.
# Keeps lockfiles healthy without auto-merging. Reviewers gate the merge.
# No Claude Code automation is wired here — this repo uses a 3rd-party
# Claude provider, so Anthropic GitHub apps stay out of CI.
#
# Major-version bumps are intentionally suppressed for every ecosystem.
# Reasons:
#   - Major bumps almost always need code changes; an unattended PR helps no one.
#   - Engines pins (Node >=20.18) and TS/React majors gate themselves on the
#     ecosystem anyway; opening 10 red PRs a week is just noise.
#   - When you actually want a major, do `pnpm up <pkg>@latest` or
#     `uv add <pkg>@<version>` by hand and review the breaking changes.

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '08:00'
    open-pull-requests-limit: 5
    labels: [dependencies, ts]
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'pip'
    directories:
      - '/'
      - '/apps/llmagent'
      - '/apps/server'
      - '/python-packages/shared'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '08:00'
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    labels: [dependencies, ci]
    commit-message:
      prefix: 'chore(ci)'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
