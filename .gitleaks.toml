# Generated by gitleaks for LLMSLG.
# Allow common false positives that show up in this repo.
title = "LLMSLG gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Known-safe placeholders and examples."
paths = [
  '''(?i).*\.env\.example$''',
  '''(?i).*\.example\.env$''',
  '''(?i).*\.md$''',
  '''(?i).*/CLAUDE\.md$''',
  '''(?i).*/SKILL\.md$''',
  '''(?i).*/docs/.*''',
]
regexTarget = "match"
regexes = [
  # Placeholders.
  '''sk-(your|example|placeholder|TODO|REPLACE)[-_A-Za-z0-9]*''',
  '''sk-ant-(your|example|placeholder|TODO|REPLACE)[-_A-Za-z0-9]*''',
  '''ghp_(your|example|placeholder|TODO|REPLACE)[-_A-Za-z0-9]*''',
]
